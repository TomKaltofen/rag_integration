[tox]
# Mirror the CI version matrix (.github/workflows/test.yml) so a local `tox`
# exercises the same interpreters as CI. Missing interpreters are skipped with
# a warning rather than failing, so contributors with only one version can still
# run `tox` locally.
envlist = py310, py313, py314
skip_missing_interpreters = true
work_dir = {toxinidir}/.tox

[testenv]
usedevelop = true
extras =
    dev
    advanced
passenv =
    CI
    UV_CACHE_DIR
setenv =
    KMP_DUPLICATE_LIB_OK = TRUE
    OMP_NUM_THREADS = 1
allowlist_externals = sh
commands =
    pytest
    ruff format --check --line-length 120 .
    ruff check .
    mypy --strict --ignore-missing-imports .
    bandit -c pyproject.toml -r -q .

[testenv:security]
# CVE scanning environment - builds and scans the local package
usedevelop = true
extras = dev,advanced
deps =
    pip-audit
allowlist_externals = sh, mkdir
commands =
    mkdir -p security-reports

    sh -c "pip list"

    # Run CVE scan on installed dependencies
    sh -c "pip-audit --desc --format=json --output=security-reports/pip-audit.json || pip-audit --desc"

    # Display summary
    sh -c "echo '=== CVE Scan Summary ==='"
    sh -c "echo 'Tool: pip-audit (Apache 2.0 licensed)'"
    sh -c "echo 'Report: security-reports/pip-audit.json'"
